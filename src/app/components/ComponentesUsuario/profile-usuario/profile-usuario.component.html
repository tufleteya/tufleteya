    <div class="profile-usuario-shell mt-10 w-full flex justify-center items-center">
        <section
            *ngIf="DatosU"
            class="bg-white/20 backdrop-blur-2xl rounded-3xl shadow-2xl w-[90%] max-w-md p-8 flex flex-col items-center text-center space-y-6
                  transform transition-all duration-500 ease-out hover:scale-[1.02] hover:shadow-green-900/30">
    
            <div class="relative group flex justify-center">
                <img
                    [src]="DatosU?.photoURL || DatosU?.image || 'https://i.pravatar.cc/150?u=' + DatosU?.email"
                    alt="Foto de perfil"
                    class="w-32 h-32 rounded-full border-4 border-white shadow-lg object-cover
                          transition-transform duration-500 ease-in-out group-hover:scale-110 group-hover:shadow-[#2add0f]/40"
                />
                <button
                    (click)="openFileInput()"
                    class="absolute bottom-0 right-[calc(50%-4rem)] bg-[#2add0f] hover:bg-green-600 text-white p-2 rounded-full shadow-md
                          transition-all duration-300 ease-in-out hover:rotate-12 hover:scale-110"
                    aria-label="Cambiar foto"
                    type="button">
                    <ion-icon name="create-outline" size="small" class="animate-pulse"></ion-icon>
                </button>
                <input #fileInput type="file" accept="image/jpeg, image/png, image/gif" (change)="handleFileInput($event)" hidden />
            </div>
    
            <div class="transition-opacity duration-500 ease-in-out hover:opacity-90">
                <h2 class="text-white text-3xl font-bold tracking-wide drop-shadow-lg">
                    {{ DatosU?.nombre }} {{ DatosU?.apellido }}
                </h2>
                <p class="text-[#2add0f] italic text-lg opacity-80">{{ DatosU?.edad }} años</p>
            </div>
    
            <div class="w-full bg-white/10 rounded-2xl p-5 shadow-inner text-white/90 
                         transition-all duration-500 hover:bg-white/20 hover:shadow-lg hover:scale-[1.01]">
                <h3 class="text-2xl font-semibold flex items-center justify-center gap-2 mb-4 text-[#2add0f]">
                    <ion-icon name="person-circle-outline"
                              class="text-[#2add0f] text-3xl transition-transform duration-300 hover:scale-125 animate-pulse"></ion-icon>
                    Datos Personales
                </h3>
                <div class="space-y-2 text-lg">
                    <p class="flex items-center justify-center gap-2">
                        <ion-icon name="mail-outline"
                                  class="text-[#2add0f] text-2xl transition-transform duration-300 hover:scale-125"></ion-icon>
                        <a href="mailto:{{ DatosU?.email }}" class="hover:underline">{{ DatosU?.email }}</a>
                    </p>
                    <p class="flex items-center justify-center gap-2">
                        <ion-icon name="call-outline"
                                  class="text-[#2add0f] text-2xl transition-transform duration-300 hover:scale-125"></ion-icon>
                        <a href="tel:{{ DatosU?.telefono }}" class="hover:underline">{{ DatosU?.telefono }}</a>
                    </p>
                    <p class="flex items-center justify-center gap-2">
                        <ion-icon name="location-outline"
                                  class="text-[#2add0f] text-2xl transition-transform duration-300 hover:scale-125"></ion-icon>
                        <span>{{ DatosU?.domicilio }}</span>
                    </p>
                </div>
            </div>
    
        </section>
    </div>
