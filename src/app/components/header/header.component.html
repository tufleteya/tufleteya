<ion-header class="tfy-app-header">
  <ion-toolbar class="tfy-app-toolbar">

    <!-- Botón Back -->
    <ion-buttons *ngIf="login" slot="start" class="flex items-center">
      <ion-back-button
        [defaultHref]="homeHref"
        text=""
        icon="chevron-back-outline"
        aria-label="Volver"
        class="header-back-button text-white text-lg">
      </ion-back-button>
    </ion-buttons>

    <!-- Título opcional -->
   

    <!-- Botón Menú -->
    <ion-buttons slot="end" class="flex items-center space-x-2">
      <!-- Chat Button -->
      <ion-button *ngIf="login && !rolPanel" (click)="goToChat()" class="text-white text-2xl p-2 rounded-full hover:bg-white/20 transition-colors duration-200 relative">
        <ion-icon name="chatbubbles-outline"></ion-icon>
        <ion-badge *ngIf="chatCount$ | async as count" color="danger" class="absolute -top-1 -right-1">{{ count }}</ion-badge>
      </ion-button>
      <ion-menu-button class="text-white text-2xl p-2 rounded-full hover:bg-white/20 transition-colors duration-200">
        <ion-icon name="grid-outline"></ion-icon>
      </ion-menu-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
