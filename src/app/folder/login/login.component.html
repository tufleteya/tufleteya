 <ion-content fullscreen class="bg-gradient-to-br from-teal-800 to-cyan-700 flex justify-center items-start px-4">

    <div class="mt-4 w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl px-8 pb-8 pt-4 flex flex-col items-center space-y-5
                 shadow-3xl shadow-teal-900/50 
                 transform transition-all duration-700 ease-out 
                 hover:shadow-[#2add0f]/30
                 mx-auto">

     <div class="w-44 h-28 -mt-2 mb-1 flex items-center justify-center
    transform transition-transform duration-500 hover:scale-105">
    
    <img 
        src="assets/icon/favicon4.webp"
        alt="Logo de la Aplicación TuFleteYa" 
        loading="eager"
        decoding="async"
        class="max-w-full max-h-full object-contain drop-shadow-xl">
</div>  

        <h2 class="text-white text-3xl font-bold tracking-wide drop-shadow-md">Bienvenido</h2>
        <p class="text-[#2add0f] text-sm mb-4 text-center opacity-80">Inicia sesión para continuar</p>

        <form (ngSubmit)="login()" class="w-full flex flex-col space-y-4">

            <div class="flex flex-col">
                <label for="email" class="text-white mb-1 font-medium">Correo electrónico</label>
                <input 
                    id="email" 
                    type="email" 
                    [(ngModel)]="credenciales.email" 
                    name="email"
                    required
                    class="px-4 py-3 rounded-xl bg-white/95 text-gray-800 placeholder-gray-500 border border-white/20 
                           focus:outline-none focus:ring-4 focus:ring-[#2add0f]/50 focus:border-[#2add0f] 
                           transition-all duration-300 ease-in-out shadow-inner hover:bg-white/100">
            </div>

            <div class="flex flex-col">
                <label for="password" class="text-white mb-1 font-medium">Contraseña</label>
                <input 
                    id="password" 
                    type="password" 
                    [(ngModel)]="credenciales.password" 
                    name="password"
                    required
                    class="px-4 py-3 rounded-xl bg-white/95 text-gray-800 placeholder-gray-500 border border-white/20 
                           focus:outline-none focus:ring-4 focus:ring-[#2add0f]/50 focus:border-[#2add0f] 
                           transition-all duration-300 ease-in-out shadow-inner hover:bg-white/100">
            </div>

            <div class="flex items-center space-x-2">
                <input type="checkbox" id="remember" class="accent-[#2add0f] w-4 h-4"
                       [checked]="recordarContrasena"
                       (change)="toggleRecordarContrasena($any($event.target).checked)">
                <label for="remember" class="text-white text-sm">Recordarme</label>
            </div>

            <button type="submit"
                    [disabled]="googleLoading"
                    class="mt-4 bg-[#2add0f] hover:bg-green-600 text-white **text-white** font-extrabold py-3 rounded-2xl text-lg
                           shadow-xl shadow-[#2add0f]/60 
                           transition-all duration-300 hover:scale-[1.02] hover:shadow-[#2add0f]/80
                           active:scale-95">
                Ingresar
            </button>

            <button type="button" (click)="signInWithGoogle()"
                    [disabled]="googleLoading"
                    class="tfy-google-button">
                <ion-icon name="logo-google" class="text-2xl"></ion-icon>
                {{ googleLoading ? 'Ingresando con Google...' : 'Ingresar con Google' }}
            </button>

        </form>

        <p class="mt-4 text-white/80 text-sm drop-shadow-sm text-center">
            ¿No tienes cuenta?
            <a (click)="redirRegistro()" class="text-[#2add0f] hover:text-green-400 font-semibold cursor-pointer 
                                                 transition-colors duration-200">
                Regístrate aquí
            </a>
        </p>

        <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-xs font-semibold text-white/75">
            <a routerLink="/legal/privacidad" class="hover:text-[#2add0f] transition-colors">Politica de Privacidad</a>
            <a routerLink="/legal/terminos" class="hover:text-[#2add0f] transition-colors">Terminos y Condiciones</a>
        </div>

    </div>

</ion-content>
